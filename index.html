<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alessandro Melandri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Syne:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F7F5F2;
      --border:     #E0DCD6;
      --ink:        #1A1917;
      --ink-dim:    #8A8680;
      --accent:     #C0622A;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'Syne', system-ui, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* subtle grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ambient glow */
    body::after {
      content: '';
      position: fixed;
      bottom: -150px;
      right: -150px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,98,42,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    header {
      padding-top: clamp(3rem, 8vh, 6rem);
      padding-bottom: 3rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: var(--ink);
      opacity: 0;
      animation: slideIn 0.6s ease 0.1s forwards;
    }

    h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--ink-dim);
    }

    .tagline-block {
      margin-top: 2.5rem;
      padding-left: 1.5rem;
      border-left: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .tagline-block .line {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--ink);
      font-weight: 300;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      animation: slideIn 0.5s ease forwards;
    }

    .tagline-block .line:nth-child(1) { animation-delay: 0.3s; }
    .tagline-block .line:nth-child(2) { animation-delay: 0.45s; }
    .tagline-block .line:nth-child(3) { animation-delay: 0.6s; }
    .tagline-block .line:nth-child(4) { animation-delay: 0.75s; }

    .tagline-block .line .marker {
      font-size: 0.5rem;
      color: var(--accent);
      opacity: 0.7;
      flex-shrink: 0;
    }

    .tagline-block .line strong {
      font-weight: 700;
      color: var(--accent);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      margin: 2.5rem 0;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.9s forwards;
    }

    .social-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }

    .social-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
      font-weight: 700;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--ink-dim);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      letter-spacing: 0.02em;
    }

    .social-link:hover {
      color: var(--ink);
      border-color: var(--accent);
      background: rgba(192,98,42,0.05);
    }

    .social-link svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
      flex-shrink: 0;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--border);
      letter-spacing: 0.06em;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 540px) {
      h1 { font-size: 2.4rem; }
      .tagline-block { padding-left: 1rem; }
      .social-row { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
      footer { flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>

<div class="page">
  <header>
    <h1>Alessandro<br><em>Melandri</em></h1>

    <div class="tagline-block">
      <div class="line"><span class="marker">◆</span> IT Project Manager</div>
      <div class="line"><span class="marker">◆</span> strimpello <strong>la chitarra</strong></div>
      <div class="line"><span class="marker">◆</span> fotografo particolari insignificanti</div>
      <div class="line"><span class="marker">◆</span> studio <strong>la Lingua dei Segni Italiana</strong></div>
    </div>

    <div class="divider"></div>

    <div class="social-row">
      <a class="social-link" href="https://mastodon.uno/@alemelandri" rel="me" target="_blank" rel="noopener me">
        <svg viewBox="0 0 74 79" xmlns="http://www.w3.org/2000/svg">
          <path d="M73.7 17.7C72.7 10.7 66.8 5 59.7 3.8 58.3 3.6 52.8 3 39.6 3H39.5C26.3 3 23.5 3.6 22.1 3.8 15.3 5 9 9.9 7.3 16.9c-.8 3.5-.9 7.3-.7 10.8.3 5.3.4 10.6 1.3 15.8.7 3.6 1.5 7.1 2.8 10.5 2.3 5.9 8.2 10.7 14.2 12.7 6.3 2.1 13.1 2.4 19.6 1.1.7-.2 1.4-.3 2.1-.5 1.5-.4 3.2-.9 4.5-1.8 0 0 .1 0 .1-.1v-6.3c0 0-.1 0-.1 0-.8.2-1.7.4-2.6.6-3.7.8-7.5 1.1-11.4.8-6.6-.5-13.2-2.1-14.6-8.7-.1-.5-.2-1-.2-1.5 0 0 6 1.5 13.7 1.8 4.7.2 9.2-.3 13.7-.9 4.3-.6 8.7-1.9 12.4-4.3 2.8-1.7 5.2-4.2 6.5-7.2 1.7-3.9 2-8.2 2.1-12.4.1-1.5.1-3.1.1-4.6C74 23.5 74.1 20.5 73.7 17.7zM61.3 44.7h-8.1V25.3c0-4.1-1.7-6.1-5.2-6.1-3.8 0-5.8 2.5-5.8 7.3v10.5h-8V26.6c0-4.9-2-7.3-5.8-7.3-3.5 0-5.2 2.1-5.2 6.2V44.7H15V24.7c0-4.1 1-7.3 3.1-9.8 2.2-2.5 5-3.7 8.6-3.7 4.1 0 7.2 1.6 9.2 4.7l2 3.3 2-3.3c2-3.1 5.1-4.7 9.2-4.7 3.5 0 6.4 1.3 8.6 3.7 2.1 2.5 3.1 5.8 3.1 9.8V44.7z"/>
        </svg>
        Mastodon
      </a>
    </div>
  </header>
</div>

<footer>
  <span>Alessandro Melandri</span>
  <span>© 2026</span>
</footer>

</body>
</html>
