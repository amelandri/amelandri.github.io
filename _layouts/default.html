<!DOCTYPE html>
<html lang="en-us">

  <head>
    <link href="http://gmpg.org/xfn/11" rel="profile">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
  
    <!-- Enable responsiveness on mobile devices-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  
    <title>
      {% if page.title == "Home" %}
        {{ site.title }} &middot; {{ site.tagline }}
      {% else %}
        {{ page.title }} &middot; {{ site.title }}
      {% endif %}
    </title>
  
    <!-- CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/public/css/style.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/public/css/syntax.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,700|Roboto:400,900" rel="stylesheet"> 
  
    <!-- Icons -->
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ site.baseurl }}/public/apple-icon-180x180.png">
    <link rel="shortcut icon" href="{{ site.baseurl }}/public/apple-icon-180x180.png">
  
    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">
  </head>

  <body>

    <div class="wrap">
      <div class="masthead">
        <div class="container">
          <h3 class="masthead-title">
            <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
          </h3>
        </div>
	<div class="container headmenu">
		{% assign pages_list = site.pages | sort:"url" %}
    {% for node in pages_list %}
      {% if node.title != null %}
        {% if node.layout == "page" %}
           <a class="headmenu-item{% if page.url == node.url %} active{% endif %}" href="{{ node.url }}">{{ node.title }}</a> / 
        {% endif %}
      {% endif %}
    {% endfor %}
	</div>
      </div>

      <div class="container content">
        {{ content }}

        <div class="contentfooter">
	        &copy; 2009-{{ site.time | date: '%Y' }} Alessandro Melandri
        </div>

      </div>
    </div>


    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-114660988-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'UA-114660988-1');
    </script>

    <link rel="stylesheet" type="text/css" href="//cdnjs.cloudflare.com/ajax/libs/cookieconsent2/3.0.3/cookieconsent.min.css" />
    <script src="//cdnjs.cloudflare.com/ajax/libs/cookieconsent2/3.0.3/cookieconsent.min.js"></script>
    <script>
    window.addEventListener("load", function(){
    window.cookieconsent.initialise({
      "palette": {
        "popup": {
          "background": "#f1f1f1"
        },
        "button": {
          "background": "#ec3d1f"
        }
      },
      "theme": "classic",
      "position": "bottom-right",
      "content": {
        "href": "https://cookiesandyou.com/"
      }
    })});
    </script>

  </body>
</html>
