<!doctype html>
<html lang="en">

  {% include head.html %}

  <body class="{{ page.class }}">

    <div class="container content">
    
      <header class="masthead">
        <h3 class="masthead-title">
          <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
        </h3>
        <div class="masthead-tagline">
          {{ site.tagline }}
        </div>
        <div class="menu">
          <div class="menu_left">
            <a href="/about">About</a>
            <a href="/archive">Archive</a>
            <a href="/photo">Photo</a>
          </div>
          <div class="menu_right">
            <a href="https://www.linkedin.com/in/alessandromelandri/"><i class="fa-brands fa-linkedin"></i> Linkedin</a>
            <a href="https://mastodon.uno/@alemelandri" rel="me"><i class="fa-brands fa-mastodon"></i> Mastodon</a>
          </div>
        </div>
      </header>
      
      <main>
        {{ content }}
      </main>

      <footer class="footer">
        <small>
          &copy; <time datetime="{{ site.time | date_to_xmlschema }}">{{ site.time | date: '%Y' }}</time> Alessandro Melandri. All rights reserved.
        </small>
      </footer>
    </div>

    <script src="https://tinylytics.app/embed/s-Yj_3zxC2LhzmyYeGoN.js" defer></script>

  </body>
</html>
