---
layout: default
---

<div class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <span class="post-date">{{ page.date | date_to_string }}</span>
  {{ content }}

  {% if page.external-url != nil %}
  <p class="postSource">Source: <a href="{{ page.external-url }}" target="_blank">{{ page.external-url }}</a></p>
  {% endif %}

</div>
